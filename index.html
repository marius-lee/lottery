<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0F23">
  <title>双色球 · 智能选号</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='g' cx='40%' cy='35%'><stop offset='0%' stop-color='%23EF4444'/><stop offset='100%' stop-color='%23991B1B'/></radialGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)' stroke='%23FCA5A5' stroke-width='1'/><text x='16' y='22' text-anchor='middle' font-size='14' font-weight='bold' fill='white' font-family='sans-serif'>SSQ</text></svg>">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <svg class="brand-dot" viewBox="0 0 12 12" width="14" height="14" fill="currentColor">
        <circle cx="6" cy="6" r="6"/>
      </svg>
      <h1>双色球 · 智能选号</h1>
    </div>
    <div class="header-meta">
      <span id="dataBtnText" class="data-label">默认数据</span>
      <button class="data-toggle" id="dataToggle" onclick="fetchLatestData()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9"/>
          <path d="M21 3v6h-6"/>
        </svg>
        更新数据
      </button>
      <span id="dataMsg" class="data-msg"></span>
    </div>
  </header>

  <!-- 策略面板 -->
  <section class="strategy-panel">
    <div class="panel-header">
      <h3>策略面板</h3>
      <div class="draw-count-wrap">
        <label for="drawCount">注数</label>
        <select id="drawCount" onchange="updateDrawCount()">
          <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option>
        </select>
        <span class="cost-hint">¥6/期</span>
        <label for="maxOverlap" style="margin-left:12px;">重叠</label>
        <select id="maxOverlap" onchange="updateMaxOverlap()" style="font-size:12px;padding:2px 6px;">
          <option value="none">不限</option>
          <option value="0" selected>0</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>
    </div>

    <div class="draw-toolbar">
      <button class="btn btn-draw btn-primary-draw" id="drawBtn" onclick="startDraw()">
        <span class="btn-icon">🎰</span> 出号
      </button>
      <button class="btn btn-save" id="saveBtn" onclick="saveCurrentDraw()" disabled>
        <span class="btn-icon">💾</span> 保存
      </button>
    </div>

    <!-- 信号面板 -->
    <div class="option-section-label" style="margin-top:12px;">🧬 信号融合</div>
    <div id="signalsPanel" style="padding:0 4px;margin-bottom:8px;">
      <div id="signalsContent" style="font-size:12px;color:#A78BFA;padding:4px 0;">加载中...</div>
    </div>
  </section>

  <!-- Stage -->
  <div id="drawProgress" style="text-align:center;font-size:12px;color:#FFFFFF;margin:0 16px 4px 16px;"></div>
  <div id="progressBarWrap" style="margin:0 16px 4px 16px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;">
    <div id="progressBar" style="height:100%;width:0;background:linear-gradient(90deg,#DC2626,#F97316);border-radius:2px;transition:width 0.3s;"></div>
  </div>
  <section class="stage" id="stage"></section>

  <!-- 复盘 -->
  <div class="review-section" style="margin:16px;">
    <div class="review-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <h3 style="color:#FFFFFF;font-size:14px;">复盘跟踪</h3>
      <button class="btn-small" onclick="refreshReviewPanel()" style="background:#1A1A25;border:1px solid rgba(255,255,255,0.08);border-radius:4px;color:#FFFFFF;padding:4px 10px;cursor:pointer;font-size:12px;">刷新</button>
    </div>
    <div id="reviewSummary" style="font-size:12px;color:#999;margin-bottom:8px;"></div>
    <div class="bt-scroll" style="max-height:400px;overflow-y:auto;">
      <table class="bt-table" style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="color:#999;"><th>期号</th><th>预测</th><th>实际</th><th>红球命中</th><th>蓝球</th></tr></thead>
        <tbody id="reviewTbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module" src="static/js/app.js"></script>
</body>
</html>
